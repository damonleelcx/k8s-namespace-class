apiVersion: akuity.io/v1alpha1
kind: NamespaceClass
metadata:
  name: multi-kind-demo
spec:
  resources:
    - apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: app-runner
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: class-config
      data:
        tier: sandbox
        profile: v2
        note: upgraded-by-namespaceclass-spec
    - apiVersion: v1
      kind: LimitRange
      metadata:
        name: mem-limit-range
      spec:
        limits:
          - max:
              memory: "512Mi"
            type: Container
