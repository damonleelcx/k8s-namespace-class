apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: namespaceclasschangerequests.akuity.io
spec:
  group: akuity.io
  names:
    kind: NamespaceClassChangeRequest
    listKind: NamespaceClassChangeRequestList
    plural: namespaceclasschangerequests
    singular: namespaceclasschangerequest
    shortNames:
      - nsclasscr
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: ["namespaceClassName", "recommendationID"]
              properties:
                namespaceClassName:
                  type: string
                recommendationID:
                  type: string
                approved:
                  type: boolean
                  default: false
                allowHighRisk:
                  type: boolean
                  default: false
                pullRequestURL:
                  type: string
                  description: >
                    Merged or approved pull request URL authorizing this apply (e.g. GitHub/GitLab PR).
                    Required when NamespaceClass has annotation namespaceclass.akuity.io/require-pull-request=true
                    or when the controller runs with NAMESPACECLASS_REQUIRE_PULL_REQUEST_URL set.
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                lastTransitionTime:
                  type: string
                appliedSpecSnapshot:
                  type: string
                appliedPullRequestURL:
                  type: string
                  description: pullRequestURL from spec at the time the recommendation was applied (audit)
      subresources:
        status: {}
